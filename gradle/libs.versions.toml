json = "20260522"
jsoup = "1.22.2"
junit = "4.13.2"
lifecycle = "2.11.0"
material = "1.14.0"
navigation = "2.9.8"
okhttp = "5.4.0"
recyclerview = "1.4.0"
work = "2.11.2"
