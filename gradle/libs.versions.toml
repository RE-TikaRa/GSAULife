[versions]
activity = "1.13.0"
appcompat = "1.7.1"
browser = "1.10.0"
constraintlayout = "2.2.1"
core = "1.19.0"
coroutines = "1.11.0"
customview = "1.2.0"
fragment = "1.8.9"
