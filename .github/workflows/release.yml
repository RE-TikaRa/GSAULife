name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android SDK packages
        run: sdkmanager 'platforms;android-37.0' 'build-tools;36.0.0'

      - name: Validate release tag
        env:
          TAG: ${{ github.ref_name }}
        run: '[[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]'

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: printf '%s' "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release.jks"

      - name: Verify and build release APK
        env:
          VERSION_CODE: ${{ github.run_number }}
          KEYSTORE_FILE: ${{ runner.temp }}/release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          export VERSION_NAME="${GITHUB_REF_NAME#v}"
          ./gradlew test lint :app:assembleDebug :app:assembleRelease --console=plain

      - name: Verify APK signature
        run: |
          set -o pipefail
          BUILD_TOOLS="$(find "$ANDROID_SDK_ROOT/build-tools" -mindepth 1 -maxdepth 1 -type d | sort -V | tail -n 1)"
          APK=app/build/outputs/apk/release/app-release.apk
          "$BUILD_TOOLS/apksigner" verify --verbose --print-certs "$APK" | tee "$RUNNER_TEMP/signature.txt"
          grep -qx 'Signer #1 certificate SHA-256 digest: 3152994da0d1c7fb1e6129f23446cdc7baaf03fdea9160899a5dcc59f33446d9' "$RUNNER_TEMP/signature.txt"

      - name: Prepare artifact
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/release/app-release.apk "dist/GSAULife-${{ github.ref_name }}.apk"

      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/GSAULife-${{ github.ref_name }}.apk
          generate_release_notes: true
