name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android SDK packages
        run: sdkmanager 'platforms;android-37.0' 'build-tools;36.0.0'

      - name: Validate release tag
        env:
          TAG: ${{ github.ref_name }}
        run: |
          [[ "$TAG" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]] || exit 1
          IFS=. read -r major minor patch <<< "${TAG#v}"
          ((10#$major <= 999 && 10#$minor <= 999 && 10#$patch <= 999)) || exit 1
          version_code=$((10#$major * 1000000 + 10#$minor * 1000 + 10#$patch))
          ((version_code > 0)) || exit 1

          previous="$(
            git tag --list 'v*' --sort=-version:refname |
              grep -E '^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$' |
              grep -Fxv "$TAG" |
              head -n 1 || true
          )"
          if [[ -n "$previous" && "$(printf '%s\n%s\n' "$previous" "$TAG" | sort -V | tail -n 1)" != "$TAG" ]]; then
            printf 'Release tag %s must be newer than %s\n' "$TAG" "$previous" >&2
            exit 1
          fi

          printf 'VERSION_NAME=%s\n' "${TAG#v}" >> "$GITHUB_ENV"
          printf 'VERSION_CODE=%s\n' "$version_code" >> "$GITHUB_ENV"

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: printf '%s' "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release.jks"

      - name: Verify and build release APK
        env:
          KEYSTORE_FILE: ${{ runner.temp }}/release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew test lint :app:assembleDebug :app:assembleRelease --console=plain

      - name: Verify APK signature
        run: |
          set -o pipefail
          BUILD_TOOLS="$(find "$ANDROID_SDK_ROOT/build-tools" -mindepth 1 -maxdepth 1 -type d | sort -V | tail -n 1)"
          APK=app/build/outputs/apk/release/app-release.apk
          "$BUILD_TOOLS/apksigner" verify --verbose --print-certs "$APK" | tee "$RUNNER_TEMP/signature.txt"
          grep -qx 'Number of signers: 1' "$RUNNER_TEMP/signature.txt"
          grep -q 'certificate SHA-256 digest: 3152994da0d1c7fb1e6129f23446cdc7baaf03fdea9160899a5dcc59f33446d9$' "$RUNNER_TEMP/signature.txt"

      - name: Prepare artifact
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/release/app-release.apk "dist/GSAULife-${{ github.ref_name }}.apk"

      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/GSAULife-${{ github.ref_name }}.apk
          generate_release_notes: true
